name: Release Build

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      build_android:
        type: boolean
        default: true
      build_linux:
        type: boolean
        default: true
      build_windows:
        type: boolean
        default: true

permissions:
  contents: write

# ---------------- ANDROID ----------------
jobs:
  build-android:
    if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Init specific submodule
        run: |
          git submodule update --init packages/anymex_extension_bridge

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.7
          cache: true

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Create env file
        run: |
          cat <<EOF > keys.json
          {
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANILIST_CLIENT_SECRET": "${{ secrets.ANILIST_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "COMMENTUM_API_URL": "${{ secrets.COMMENTUM_API_URL }}"
          }
          EOF

      - run: flutter pub get

      - run: flutter build apk --release --split-per-abi
          --dart-define-from-file=keys.json

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk

  # ---------------- LINUX ----------------
  build-linux:
    if: github.event_name == 'push' || github.event.inputs.build_linux == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo add-apt-repository universe
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev wpewebkit libmpv-dev

      - uses: actions/checkout@v4

      - name: Init specific submodule
        run: |
          git submodule update --init packages/anymex_extension_bridge

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.7
          cache: true

      - name: Create env file
        run: |
          cat <<EOF > keys.json
          {
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANILIST_CLIENT_SECRET": "${{ secrets.ANILIST_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "COMMENTUM_API_URL": "${{ secrets.COMMENTUM_API_URL }}"
          }
          EOF

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release --dart-define-from-file=keys.json

      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle

  # ---------------- WINDOWS ----------------
  build-windows:
    if: github.event_name == 'push' || github.event.inputs.build_windows == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Init specific submodule
        run: |
          git submodule update --init packages/anymex_extension_bridge

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.7
          cache: true

      - name: Enable Windows
        run: flutter config --enable-windows-desktop

      - name: Create env file
        run: |
          echo '{
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANILIST_CLIENT_SECRET": "${{ secrets.ANILIST_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "COMMENTUM_API_URL": "${{ secrets.COMMENTUM_API_URL }}"
          }' > keys.json

      - run: flutter pub get

      - run: flutter build windows --release --dart-define-from-file=keys.json

      - name: Build installer (InnoBundle)
        run: dart run inno_bundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release
